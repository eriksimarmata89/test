<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uji Bagikan</title>
<style>
  body{font-family:-apple-system,Roboto,Arial,sans-serif;padding:24px;background:#F4F4F2;color:#2C2C2A;}
  h1{font-size:18px;margin:0 0 6px;}
  p{font-size:13px;color:#6B6B66;margin:0;}
  button{width:100%;padding:16px;font-size:16px;font-weight:600;color:#fff;background:#185FA5;border:none;border-radius:12px;margin-top:14px;}
  #log{margin-top:20px;font-size:13px;line-height:1.6;white-space:pre-wrap;background:#fff;border-radius:12px;padding:14px;border:1px solid #E7E7E2;min-height:120px;}
</style>
</head>
<body>
  <h1>Uji Bagikan File</h1>
  <p>Ketuk tombol untuk menguji apakah aplikasi bisa membagikan file ke aplikasi lain.</p>
  <button onclick="ujiPDF()">Uji bagikan PDF</button>
  <button onclick="ujiTeks()" style="background:#1D9E75">Uji bagikan berkas teks</button>
  <div id="log">Menunggu...</div>

<script>
function tulis(m){ document.getElementById('log').textContent += "\n" + m; }
function reset(){ document.getElementById('log').textContent = "Mulai..."; }
function cek(){
  tulis("navigator.share ada? " + (typeof navigator.share === 'function' ? "YA" : "TIDAK"));
  tulis("navigator.canShare ada? " + (typeof navigator.canShare === 'function' ? "YA" : "TIDAK"));
}
async function bagikan(file){
  if(typeof navigator.canShare === 'function'){
    var boleh = navigator.canShare({files:[file]});
    tulis("canShare file? " + (boleh ? "YA" : "TIDAK"));
    if(!boleh){ tulis("HASIL: WebView menolak berbagi jenis berkas ini."); return; }
  }
  if(typeof navigator.share !== 'function'){
    tulis("HASIL: navigator.share tidak tersedia di WebView ini.");
    return;
  }
  try{
    await navigator.share({files:[file], title:"Uji", text:"Berkas uji"});
    tulis("HASIL: Jendela berbagi terbuka. BERHASIL.");
  }catch(e){
    if(e && e.name === 'AbortError'){
      tulis("HASIL: Jendela berbagi sempat terbuka lalu dibatalkan. Web Share BEKERJA.");
    }else{
      tulis("HASIL: Gagal. " + (e && e.name) + ": " + (e && e.message));
    }
  }
}
async function ujiPDF(){
  reset(); cek();
  var blob = new Blob(["%PDF-1.4 uji"], {type:'application/pdf'});
  var file = new File([blob], "uji.pdf", {type:'application/pdf'});
  tulis("Berkas dibuat: " + file.name + " (" + file.size + " byte)");
  await bagikan(file);
}
async function ujiTeks(){
  reset(); cek();
  var blob = new Blob(["berkas uji teks"], {type:'text/plain'});
  var file = new File([blob], "uji.txt", {type:'text/plain'});
  tulis("Berkas dibuat: " + file.name + " (" + file.size + " byte)");
  await bagikan(file);
}
</script>
</body>
</html>
